<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>RL Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:'Rajdhani','Segoe UI',sans-serif}

/* ── HUD strip ───────────────────────────── */
#hud{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:0;
  background:rgba(12,14,20,0.82);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;overflow:hidden;backdrop-filter:blur(6px);
  transition:opacity .3s;
}
.hud-block{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 22px;min-width:72px;
}
.hud-label{font-size:8px;letter-spacing:2px;color:rgba(180,180,180,.55);font-weight:700;text-transform:uppercase}
.hud-val{font-size:20px;font-weight:800;line-height:1.1}
.sep{width:1px;height:36px;background:rgba(160,30,30,.7)}
#mmr-val{color:#00cfff}
#wins-val{color:#00e676}
#losses-val{color:#ff3d57}
#streak-val{color:#00e676}

/* ── Toast résultat ──────────────────────── */
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);
  background:rgba(12,14,20,.92);border-radius:12px;padding:28px 56px;
  text-align:center;border:1px solid rgba(255,255,255,.1);
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  backdrop-filter:blur(12px);
}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#toast-word{font-size:64px;font-weight:900;letter-spacing:6px;display:block;line-height:1}
#toast-sub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.6);margin-top:6px;display:block}
#toast-stats{font-size:14px;color:rgba(255,255,255,.5);margin-top:10px;display:block}
.is-win #toast-word{color:#00e676}
.is-win{border-color:rgba(0,230,118,.35)!important}
.is-loss #toast-word{color:#ff3d57}
.is-loss{border-color:rgba(255,61,87,.35)!important}

/* barre winrate haut du toast */
#wr-bar{height:4px;border-radius:2px;margin-bottom:18px;background:rgba(255,61,87,.5)}
#wr-fill{height:4px;border-radius:2px;background:#00e676;transition:width .6s ease}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">MMR</span>
    <span class="hud-val" id="mmr-val">--</span>
  </div>
  <div class="sep"></div>
  <div class="hud-block">
    <span class="hud-label">WIN</span>
    <span class="hud-val" id="wins-val">0</span>
  </div>
  <div class="sep"></div>
  <div class="hud-block">
    <span class="hud-label">LOSS</span>
    <span class="hud-val" id="losses-val">0</span>
  </div>
  <div class="sep"></div>
  <div class="hud-block">
    <span class="hud-label">STREAK</span>
    <span class="hud-val" id="streak-val">--</span>
  </div>
</div>

<div id="toast">
  <div id="wr-bar"><div id="wr-fill" style="width:50%"></div></div>
  <span id="toast-word">WIN</span>
  <span id="toast-sub">BIEN JOUÉ !</span>
  <span id="toast-stats">0W 0L</span>
</div>

<script>
let hideTimer = null;

function updateHud(d){
  document.getElementById('mmr-val').textContent    = d.mmr || '--';
  document.getElementById('wins-val').textContent   = d.wins ?? 0;
  document.getElementById('losses-val').textContent = d.losses ?? 0;
  const sv = d.streak_val || 0;
  const st = d.streak_type || '';
  const sel = document.getElementById('streak-val');
  sel.textContent = sv > 0 ? '+'+sv : sv < 0 ? ''+sv : '--';
  sel.style.color = sv > 0 ? '#00e676' : sv < 0 ? '#ff3d57' : '#00e676';
  // winrate bar
  const total = (d.wins||0)+(d.losses||0);
  const wr = total > 0 ? (d.wins||0)/total : .5;
  document.getElementById('wr-fill').style.width = (wr*100)+'%';
}

function showToast(result, d){
  const toast = document.getElementById('toast');
  const isWin = result === 'win';
  toast.classList.remove('show','is-win','is-loss');
  void toast.offsetWidth;
  toast.classList.add('show', isWin ? 'is-win' : 'is-loss');
  document.getElementById('toast-word').textContent = isWin ? 'VICTOIRE' : 'DÉFAITE';
  document.getElementById('toast-sub').textContent  = isWin ? 'BIEN JOUÉ !' : 'LA PROCHAINE FOIS';
  document.getElementById('toast-stats').textContent = (d.wins||0)+'W '+(d.losses||0)+'L';
  clearTimeout(hideTimer);
  hideTimer = setTimeout(()=> toast.classList.remove('show'), 6000);
}

// ── SSE connexion ──────────────────────────
const es = new EventSource('/events');
es.addEventListener('stats',  e => { try{ updateHud(JSON.parse(e.data)); }catch(ex){} });
es.addEventListener('result', e => {
  try{
    const d = JSON.parse(e.data);
    updateHud(d);
    showToast(d.result, d);
  }catch(ex){}
});

// ── Poll initial pour avoir les stats tout de suite ──
fetch('/stats').then(r=>r.json()).then(updateHud).catch(()=>{});
</script>
</body>
</html>
